<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/pop_produtos.css">
</head>
<body>
    <main>
            <div class="popt">
                <h1 id="nome_produto"></h1>
                <img id="img_produto" src="" class="imgpop" />
                <p id="desc_produto" class="parpop">

            <!--Captura as infromações do parâmetro-->  
             <script>
                //Função para capturas os parâmetros da POP
                function getParametro(infoCapturar){
                    urlParametro=new URLSearchParams(window.location.search)

                    return urlParametro.get(infoCapturar);
                }

                //Preenche as infromações no layot
               document.getElementById("nome_produto").textContent = getParametro("nomeProduto");
               document.getElementById("img_produto").src = getParametro("imgProduto");
               document.getElementById("desc_produto").textContent = getParametro("descricaoProduto");
             </script>     
            </div>       

    </main>
    
</body>
</html>
